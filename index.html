<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#003152;
}

#frame{
    width:100%;
    height:100%;
    border:none;
    display:block;
}
</style>
</head>

<body>

<iframe
    id="frame"
    src="Countdownl.html">
</iframe>

<script>

// 每30分钟刷新iframe（不是刷新整个浏览器）
setInterval(function(){

    const frame=document.getElementById("frame");

    frame.src="Countdownl.html?t="+Date.now();

},30*60*1000);

</script>

</body>
</html>
